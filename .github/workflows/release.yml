name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build Release
        run: |
          xcodebuild -project CodeBar.xcodeproj \
            -scheme CodeBar \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc Sign
        run: codesign --force --deep --sign - build/Build/Products/Release/CodeBar.app

      - name: Create DMG
        run: |
          TEMP_DIR=$(mktemp -d)
          DMG_DIR="$TEMP_DIR/dmg"
          mkdir -p "$DMG_DIR"
          cp -R build/Build/Products/Release/CodeBar.app "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "CodeBar" -srcfolder "$DMG_DIR" -ov -format UDZO "CodeBar.dmg"
          rm -rf "$TEMP_DIR"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: CodeBar.dmg
          generate_release_notes: true
